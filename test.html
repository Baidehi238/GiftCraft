<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AR Test - GiftCraft</title>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <style>
    body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 30px; background: #f9f9f9; }
    h2 { margin-bottom: 20px; }
    model-viewer { width: 400px; height: 400px; border-radius: 12px; background: #fff; box-shadow: 0 2px 12px rgba(0,0,0,0.1); }
    #ar-button { background: #000; color: #fff; border: none; border-radius: 8px; padding: 10px 22px; font-size: 14px; cursor: pointer; margin-top: 10px; }
  </style>
</head>
<body>

  <h2>🎁 GiftCraft AR Test</h2>

  <model-viewer
    src="http://localhost:5000/models/gift-box.glb"
    ios-src="http://localhost:5000/models/gift-box.usdz"
    alt="Gift Box"
    ar
    ar-modes="webxr scene-viewer quick-look"
    camera-controls
    auto-rotate
    shadow-intensity="1"
  >
    <button id="ar-button" slot="ar-button">
      📱 View in Your Room
    </button>
  </model-viewer>

  <p style="margin-top:16px;color:#888;font-size:13px">
    On desktop you'll see a 3D spin. On mobile, tap "View in Your Room" for AR.
  </p>

</body>
</html>
